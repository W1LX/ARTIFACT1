<body>
    
    <script>
    // Список твоих треков (можешь добавлять сколько угодно)
    const playlist = [
        { title: "Osamason - Whiteasf", src: "music/track1.mp3" },
        { title: "Nettspend - What They Say", src: "music/track2.mp3" },
        { title: "Chief Keef - Love Sosa", src: "music/track3.mp3" }
    ];

    let currentTrackIndex = 0;
    const audio = document.getElementById('main-audio');
    const playBtn = document.getElementById('player-play');
    const prevBtn = document.getElementById('player-prev');
    const nextBtn = document.getElementById('player-next');
    const trackTitle = document.getElementById('player-track-title');
    const progressBar = document.getElementById('player-progress');
    const currentTimeEl = document.getElementById('player-current-time');
    const durationEl = document.getElementById('player-duration');

    // Загрузка трека
    function loadTrack(index) {
        const track = playlist[index];
        audio.src = track.src;
        trackTitle.textContent = track.title;
    }

    // Воспроизведение / Пауза
    function togglePlay() {
        if (audio.paused) {
            audio.play().catch(e => console.log("Автовоспроизведение заблокировано браузером, нужен клик"));
            playBtn.textContent = '⏸';
        } else {
            audio.pause();
            playBtn.textContent = '▶';
        }
    }

    playBtn.addEventListener('click', togglePlay);

    // Переключение треков
    prevBtn.addEventListener('click', () => {
        currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
        loadTrack(currentTrackIndex);
        audio.play();
        playBtn.textContent = '⏸';
    });

    nextBtn.addEventListener('click', () => {
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        loadTrack(currentTrackIndex);
        audio.play();
        playBtn.textContent = '⏸';
    });

    // Автоматический переход на следующий трек по окончании
    audio.addEventListener('ended', () => {
        nextBtn.click();
    });

    // Обновление прогресс-бара и времени
    audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.value = progress;
            
            // Форматирование времени (минуты:секунды)
            let curMins = Math.floor(audio.currentTime / 60);
            let curSecs = Math.floor(audio.currentTime % 60);
            let durMins = Math.floor(audio.duration / 60);
            let durSecs = Math.floor(audio.duration % 60);
            
            if (curSecs < 10) curSecs = "0" + curSecs;
            if (durSecs < 10) durSecs = "0" + durSecs;
            
            currentTimeEl.textContent = `${curMins}:${curSecs}`;
            durationEl.textContent = `${durMins}:${durSecs}`;
        }
    });

    // Перемотка трека ползунком
    progressBar.addEventListener('input', () => {
        const seekTime = (progressBar.value / 100) * audio.duration;
        audio.currentTime = seekTime;
    });

    // Инициализация первого трека при загрузке страницы
    window.addEventListener('DOMContentLoaded', () => {
        loadTrack(currentTrackIndex);
    });
</script>
